<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard | Smart Analytics</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

</head>

<body>

  <!-- TOPBAR -->
  <div class="topbar">

    <div class="flex items-center gap-3">

      <span class="text-2xl cursor-pointer lg:hidden" onclick="toggleSidebar()">☰</span>

      <div class="flex items-center gap-3">

        <div class="hidden md:flex w-10 h-10 bg-indigo-600 rounded-xl items-center justify-center shadow-lg shadow-indigo-200">
          <span class="text-white font-bold text-sm">DB</span>
        </div>

        <span class="font-extrabold text-slate-800 text-lg md:text-xl tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-violet-600">
          Main Dashboard
        </span>

      </div>

    </div>

    <div id="dateDisplay"
      class="hidden md:block text-xs font-bold text-indigo-600 uppercase tracking-widest bg-indigo-50 px-4 py-2 rounded-full border border-indigo-100">
    </div>

  </div>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR LOAD HERE -->
    <div id="sidebar-container"></div>

    <!-- CONTENT -->
    <main class="content">

      <div class="mb-10">
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">
          Welcome Back
        </h2>
        <p class="text-slate-500 font-medium">
          Quick access to your tracking tools and analytics.
        </p>
      </div>

      <!-- CARDS -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

        <a href="analyticsdashboard.html" class="dash-card bg-white p-8 rounded-[32px] border border-slate-200 block group">
          📈 Distributor Tracker
        </a>

        <a href="retailerinsights.html" class="dash-card bg-white p-8 rounded-[32px] border border-slate-200 block group">
          💎 Retailer Insights
        </a>

        <a href="fostracker.html" class="dash-card bg-white p-8 rounded-[32px] border border-slate-200 block group">
          📍 FOS Tracker
        </a>

        <a href="upload.html" class="dash-card bg-white p-8 rounded-[32px] border border-slate-200 block group">
          ☁️ Upload Data
        </a>

        <a href="retailertracker.html" class="dash-card bg-white p-8 rounded-[32px] border border-slate-200 block group">
          🏪 Retailer Tracker
        </a>

        <a href="activationtracker.html" class="dash-card bg-white p-8 rounded-[32px] border border-slate-200 block group">
          📑 Activation Tracker
        </a>

      </div>

    </main>

  </div>

  <!-- OVERLAY -->
  <div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- JS (ONLY ONE FILE) -->
  <script src="ken/js/script.js"></script>

  <!-- LOAD SIDEBAR DYNAMICALLY -->
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const res = await fetch("sidebar.html");
      const html = await res.text();
      document.getElementById("sidebar-container").innerHTML = html;

      // date
      const now = new Date();
      document.getElementById('dateDisplay').innerText =
        now.toLocaleDateString('en-GB', {
          day: 'numeric',
          month: 'long',
          year: 'numeric'
        });
    });
  </script>

</body>
</html>
